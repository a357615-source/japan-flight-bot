name: Japan Flight Monitor (Test Mode)

on:
  schedule:
    # 台灣 05:15 (UTC 21:15)
    - cron: '15 21 * * *'
    # 台灣 14:30 (UTC 06:30)
    - cron: '30 6 * * *'
    # 台灣 23:45 (UTC 15:45)
    - cron: '45 15 * * *'
  workflow_dispatch: # 這是手動測試最重要的開關

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run monitor
        env:
          AMADEUS_KEY: ${{ secrets.AMADEUS_KEY }}
          AMADEUS_SECRET: ${{ secrets.AMADEUS_SECRET }}
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
        run: python monitor.py

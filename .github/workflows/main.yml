name: Japan Flight Monitor

on:
  schedule:
    # 台灣 05:15 (UTC 21:15 前一天) - 系統清位子黃金期
    - cron: '15 21 * * *'
    # 台灣 14:30 (UTC 06:30) - 航空公司下午手動調價期
    - cron: '30 6 * * *'
    # 台灣 23:45 (UTC 15:45) - 深夜未付款訂單最後釋出
    - cron: '45 15 * * *'
  workflow_dispatch: # 允許您在 GitHub 網頁手動點擊執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run monitor
        env:
          AMADEUS_KEY: ${{ secrets.AMADEUS_KEY }}
          AMADEUS_SECRET: ${{ secrets.AMADEUS_SECRET }}
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
        run: python monitor.py
